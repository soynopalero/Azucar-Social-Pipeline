<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azúcar Social Pipeline</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fafaf7;
    color: #1a1a1a;
    margin: 0;
    padding: 1.5rem;
    max-width: 1400px;
    margin-inline: auto;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    border-bottom: 1px solid #e0e0e0;
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }
  h1 { font-size: 1.4rem; margin: 0 0 .25rem 0; font-weight: 600; }
  .sub { color: #888; font-size: 0.85rem; }
  .stats { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.9rem; }
  .stat { display: inline-flex; align-items: center; gap: 0.4rem; }
  .stat-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .controls { display: flex; gap: 0.5rem; }
  button {
    background: white;
    border: 1px solid #d0d0d0;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    color: #333;
  }
  button:hover { background: #f0f0ee; }
  button.active { background: #1a1a1a; color: white; border-color: #1a1a1a; }
  .month { margin-bottom: 2.5rem; }
  h2 { font-size: 1rem; font-weight: 500; color: #444; margin: 0 0 0.5rem 0; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead th {
    padding: 0.5rem 0.3rem;
    text-align: left;
    font-weight: 500;
    color: #888;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid #e0e0e0;
  }
  td {
    vertical-align: top;
    border: 1px solid #ececec;
    min-height: 110px;
    height: 110px;
    padding: 0.3rem;
    background: white;
    position: relative;
  }
  td.other-month { background: #f4f4f0; color: #bbb; }
  td.today { background: #fffbea; }
  td.today .day-num { color: #b07700; font-weight: 700; }
  .day-num { font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; }
  .post {
    background: #f7f7f4;
    border-left: 3px solid #999;
    border-radius: 3px;
    padding: 0.2rem;
    margin-bottom: 0.2rem;
    font-size: 0.65rem;
    display: flex;
    gap: 0.25rem;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s;
  }
  .post:hover { background: #efece6; }
  .post img {
    width: 28px;
    height: 28px;
    object-fit: cover;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .post-meta { overflow: hidden; flex: 1; min-width: 0; }
  .post .time { display: block; font-weight: 600; color: #333; }
  .post .caption {
    display: block;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .post.posted { opacity: 0.65; }
  .post.failed { background: #ffe9e9; border-left-color: #ff3b30; }
  .post.pending { border-left-color: #f5b800; }
  .post.posted-status { border-left-color: #34c759; }
  .loading, .empty {
    text-align: center;
    padding: 3rem;
    color: #888;
  }
  /* Modal for full post detail */
  .modal-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-backdrop.show { display: flex; }
  .modal {
    background: white;
    border-radius: 8px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 1.5rem;
  }
  .modal img {
    max-width: 100%;
    border-radius: 4px;
    margin-bottom: 1rem;
  }
  .modal .caption-full {
    white-space: pre-wrap;
    background: #f7f7f4;
    padding: 0.75rem;
    border-radius: 4px;
    font-size: 0.85rem;
    line-height: 1.5;
  }
  .modal .meta-row { font-size: 0.85rem; color: #666; margin: 0.25rem 0; }
  .modal-close {
    float: right;
    border: none;
    background: transparent;
    font-size: 1.5rem;
    cursor: pointer;
    color: #888;
  }
  footer {
    margin-top: 2rem;
    padding-top: 1rem;
    border-top: 1px solid #e0e0e0;
    color: #999;
    font-size: 0.75rem;
    text-align: center;
  }
  /* Mobile */
  @media (max-width: 700px) {
    body { padding: 0.75rem; }
    h1 { font-size: 1.2rem; }
    td { min-height: 75px; height: 75px; padding: 0.2rem; }
    .post img { width: 22px; height: 22px; }
    .post { font-size: 0.55rem; padding: 0.15rem; }
    .day-num { font-size: 0.7rem; }
    thead th { font-size: 0.6rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Azúcar Social Pipeline</h1>
    <div class="sub">@cluboutandabout — what's queued and what's posted</div>
    <div class="stats" id="stats"></div>
  </div>
  <div class="controls">
    <button onclick="reload()">↻ Refresh</button>
  </div>
</header>

<main id="months">
  <div class="loading">Loading queue…</div>
</main>

<div class="modal-backdrop" id="modal" onclick="if (event.target === this) closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<footer>
  <span id="updated"></span> · Auto-syncs from <a href="https://github.com/soynopalero/Azucar-Social-Pipeline">soynopalero/Azucar-Social-Pipeline</a>
</footer>

<script>
const STATUS_COLOR = {
  pending: "#f5b800",
  posted: "#34c759",
  failed: "#ff3b30",
};

async function reload() {
  const res = await fetch("posts_queue.json?ts=" + Date.now(), { cache: "no-store" });
  const data = await res.json();
  render(data.posts || []);
}

function render(posts) {
  const counts = { pending: 0, posted: 0, failed: 0 };
  posts.forEach(p => { counts[p.status] = (counts[p.status] || 0) + 1; });

  const stats = document.getElementById("stats");
  stats.innerHTML = `
    <span class="stat"><span class="stat-dot" style="background:${STATUS_COLOR.pending}"></span>Pending: ${counts.pending}</span>
    <span class="stat"><span class="stat-dot" style="background:${STATUS_COLOR.posted}"></span>Posted: ${counts.posted}</span>
    <span class="stat"><span class="stat-dot" style="background:${STATUS_COLOR.failed}"></span>Failed: ${counts.failed}</span>
  `;

  const grouped = {};
  posts.forEach(p => {
    const d = new Date(p.scheduled_for_utc);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(p);
  });
  // Sort each day by time
  Object.values(grouped).forEach(arr => arr.sort((a, b) => new Date(a.scheduled_for_utc) - new Date(b.scheduled_for_utc)));

  const now = new Date();
  const months = [];
  const cur = new Date(now.getFullYear(), now.getMonth(), 1);
  months.push(new Date(cur));
  cur.setMonth(cur.getMonth() + 1);
  months.push(new Date(cur));

  const html = months.map(m => renderMonth(m, grouped, now)).join("");
  document.getElementById("months").innerHTML = html;

  const ts = new Date().toLocaleString("en-US", { timeZone: "America/Los_Angeles" });
  document.getElementById("updated").textContent = `Last refreshed ${ts} PT`;
}

function renderMonth(monthDate, grouped, now) {
  const year = monthDate.getFullYear();
  const month = monthDate.getMonth();
  const monthName = monthDate.toLocaleString("en-US", { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  // Sunday-first calendar
  const startOffset = firstDay.getDay(); // 0=Sun
  const totalDays = lastDay.getDate();

  // Build grid cells starting from the Sunday before/of the first
  const cells = [];
  const startDate = new Date(year, month, 1 - startOffset);
  const weeks = Math.ceil((startOffset + totalDays) / 7);

  for (let i = 0; i < weeks * 7; i++) {
    const d = new Date(startDate);
    d.setDate(startDate.getDate() + i);
    cells.push(d);
  }

  let rows = "";
  for (let w = 0; w < weeks; w++) {
    let row = "<tr>";
    for (let i = 0; i < 7; i++) {
      const d = cells[w * 7 + i];
      const inMonth = d.getMonth() === month;
      const isToday = d.toDateString() === now.toDateString();
      const classes = ["day"];
      if (!inMonth) classes.push("other-month");
      if (isToday) classes.push("today");
      const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
      const postsHtml = (grouped[key] || []).map(p => postCell(p)).join("");
      row += `<td class="${classes.join(" ")}"><div class="day-num">${d.getDate()}</div>${postsHtml}</td>`;
    }
    row += "</tr>";
    rows += row;
  }

  return `
    <section class="month">
      <h2>${monthName}</h2>
      <table>
        <thead><tr><th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </section>
  `;
}

function postCell(p) {
  const d = new Date(p.scheduled_for_utc);
  const time = d.toLocaleTimeString("en-US", { timeZone: "America/Los_Angeles", hour: "numeric", minute: "2-digit" }).toLowerCase().replace(" ", "");
  const firstLine = p.caption.split("\n")[0].slice(0, 60);
  const cls = p.status === "posted" ? "post posted posted-status" : `post ${p.status}`;
  return `<div class="${cls}" onclick='showModal(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
    <img src="${escapeHtml(p.image_url)}" loading="lazy" />
    <div class="post-meta">
      <span class="time">${time}</span>
      <span class="caption">${escapeHtml(firstLine)}</span>
    </div>
  </div>`;
}

function showModal(p) {
  const d = new Date(p.scheduled_for_utc);
  const when = d.toLocaleString("en-US", { timeZone: "America/Los_Angeles", dateStyle: "full", timeStyle: "short" });
  const html = `
    <button class="modal-close" onclick="closeModal()">×</button>
    <img src="${escapeHtml(p.image_url)}" />
    <div class="meta-row"><strong>Status:</strong> ${p.status}</div>
    <div class="meta-row"><strong>Scheduled:</strong> ${when} PT</div>
    <div class="meta-row"><strong>Platform:</strong> ${p.platform}</div>
    <div class="meta-row"><strong>ID:</strong> <code>${p.id}</code></div>
    ${p.result ? `<div class="meta-row"><strong>Result:</strong> ${escapeHtml(p.result)}</div>` : ""}
    <div style="margin-top:1rem"><strong>Caption:</strong></div>
    <div class="caption-full">${escapeHtml(p.caption)}</div>
  `;
  document.getElementById("modalContent").innerHTML = html;
  document.getElementById("modal").classList.add("show");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

function escapeHtml(s) {
  if (!s) return "";
  return s
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

reload();
// Auto-refresh every 60 seconds
setInterval(reload, 60_000);
</script>
</body>
</html>
